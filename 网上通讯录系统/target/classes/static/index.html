<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>网上通讯录系统 - 登录/注册</title>
  <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
  <style>
    body {
      background: linear-gradient(135deg, #2b5876 0%, #4e4376 100%);
      font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-container {
      width: 420px;
      background-color: rgba(255, 255, 255, 0.95);
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
      padding: 35px 30px;
      transition: all 0.3s ease;
    }
    .login-container:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 50px rgba(0, 0, 0, 0.3);
    }
    .title {
      text-align: center;
      margin-bottom: 30px;
      color: #2c3e50;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .el-form-item {
      margin-bottom: 22px;
    }
    .el-input__inner {
      border-radius: 8px;
    }
    .submit-btn {
      width: 100%;
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: bold;
      background: linear-gradient(90deg, #2b5876 0%, #4e4376 100%);
      border: none;
      transition: opacity 0.2s;
    }
    .submit-btn:hover {
      opacity: 0.9;
    }
    .toggle-link {
      text-align: right;
      margin-top: 15px;
    }
    .toggle-link .el-link {
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="login-container">
      <h3 class="title">{{ isRegister ? '校 友 自 助 注 册' : '网上通讯录系统' }}</h3>
      
      <!-- 登录表单 -->
      <el-form v-if="!isRegister" :model="loginForm">
        <el-form-item>
          <el-input v-model="loginForm.username" prefix-icon="el-icon-user" placeholder="请输入学号/工号"></el-input>
        </el-form-item>
        <el-form-item>
          <el-input v-model="loginForm.password" type="password" prefix-icon="el-icon-lock" placeholder="请输入密码" show-password></el-input>
        </el-form-item>
        <el-form-item style="margin-top: 30px;">
          <el-button type="primary" class="submit-btn" @click="handleLogin">登 录</el-button>
          <div class="toggle-link">
            <el-link type="primary" :underlined="false" @click="isRegister = true">没有账号？去注册申请 →</el-link>
          </div>
        </el-form-item>
      </el-form>

      <!-- 注册表单 -->
      <el-form v-else :model="registerForm">
        <el-form-item>
          <el-input v-model="registerForm.username" prefix-icon="el-icon-user" placeholder="请输入学号/工号"></el-input>
        </el-form-item>
        <el-form-item>
          <el-input v-model="registerForm.password" type="password" prefix-icon="el-icon-lock" placeholder="请设置登录密码" show-password></el-input>
        </el-form-item>
        <el-form-item>
          <el-input v-model="registerForm.name" prefix-icon="el-icon-edit" placeholder="请输入您的真实姓名"></el-input>
        </el-form-item>
        <el-form-item style="margin-top: 30px;">
          <el-button type="success" class="submit-btn" style="background: linear-gradient(90deg, #11998e 0%, #38ef7d 100%);" @click="handleRegister">提 交 审 核</el-button>
          <div class="toggle-link">
            <el-link type="info" :underlined="false" @click="isRegister = false">← 已有账号，返回登录</el-link>
          </div>
        </el-form-item>
      </el-form>
    </div>
  </div>

  <script src="https://unpkg.com/vue@2/dist/vue.js"></script>
  <script src="https://unpkg.com/element-ui/lib/index.js"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <script>
    new Vue({
      el: '#app',
      data() {
        return {
          isRegister: false,
          loginForm: { username: '', password: '' },
          registerForm: { username: '', password: '', name: '' }
        };
      },
      methods: {
        handleLogin() {
          axios.post('http://localhost:8080/api/auth/login', this.loginForm)
            .then(res => {
              this.$message.success('登录成功！');
              localStorage.setItem('user', JSON.stringify(res.data));
              if (res.data.role === 'ADMIN') {
                window.location.href = 'admin.html';
              } else {
                window.location.href = 'student.html';
              }
            }).catch(err => {
              this.$message.error(err.response?.data || '登录失败');
            });
        },
        handleRegister() {
          axios.post('http://localhost:8080/api/auth/register', this.registerForm)
            .then(res => {
              this.$message.success(res.data.message || '申请提交成功！');
              this.isRegister = false;
            }).catch(err => {
              this.$message.error(err.response?.data || '注册失败');
            });
        }
      }
    });
  </script>
</body>
</html>
